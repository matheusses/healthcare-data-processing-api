# Development overrides: applied when you run `docker compose up` (Compose merges with docker-compose.yml).
# To run without overrides (e.g. production-like): docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# See docs/tasks/004-containerization-and-deployment.md

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
    # Mount app for live code reload (optional; remove if you prefer image-only runs)
    volumes:
      - ./app:/app/app:ro
    # Only override CMD args (ENTRYPOINT is uvicorn app.main:app from Dockerfile)
    command: ["--host", "0.0.0.0", "--port", "8000", "--reload"]
    stdin_open: true
    tty: true
