# Grafana: dashboards and Explore (Prometheus, Loki, Tempo).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: healthcare-api
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              name: TraceID
              url: "$${__value.raw}"
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        access: proxy
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            tags:
              - key: service.name
                value: service
            queries:
              - name: Throughput
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m])) by (service)'
              - name: "Latency (p99)"
                query: 'histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le, service))'
          nodeGraph:
            enabled: true
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "1h"
            spanEndTimeShift: "-1h"
          spanBar:
            type: Tag
            tag: http.path
          lokiSearch:
            datasourceUid: loki
          tracesToLogsV2:
            datasourceUid: loki
            customQuery: true
            query: '{} | json | trace_id="$${__span.traceId}"'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: healthcare-api
data:
  dashboard-provider.yml: |
    apiVersion: 1
    providers:
      - name: Observability
        orgId: 1
        folder: Observability
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards/dashboards-json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: healthcare-api
data:
  span-metrics.json: |
    {"uid":"span-metrics","title":"Span metrics (Tempo → Prometheus)","tags":["tempo","prometheus","span-metrics"],"timezone":"browser","schemaVersion":38,"version":1,"refresh":"30s","panels":[{"id":1,"gridPos":{"h":8,"w":12,"x":0,"y":0},"type":"timeseries","title":"traces_spanmetrics_calls_total (throughput)","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"sum(rate(traces_spanmetrics_calls_total[5m])) by (service)","legendFormat":"{{service}}","refId":"A"}]},{"id":2,"gridPos":{"h":8,"w":12,"x":12,"y":0},"type":"timeseries","title":"traces_spanmetrics_latency (p99)","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le, service))","legendFormat":"{{service}} p99","refId":"A"}]},{"id":3,"gridPos":{"h":6,"w":24,"x":0,"y":8},"type":"stat","title":"Metric check","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"count(traces_spanmetrics_calls_total)","refId":"A"}],"options":{"reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}}}}]}
  api-slo.json: |
    {"uid":"api-slo","title":"API SLO","tags":["slo","api","latency","availability"],"timezone":"browser","schemaVersion":38,"version":1,"refresh":"30s","panels":[{"id":1,"gridPos":{"h":8,"w":12,"x":0,"y":0},"type":"timeseries","title":"Latency p95","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le, service))","legendFormat":"{{service}} p95","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}},{"id":2,"gridPos":{"h":8,"w":12,"x":12,"y":0},"type":"timeseries","title":"Request rate","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"sum(rate(traces_spanmetrics_calls_total[5m])) by (service)","legendFormat":"{{service}}","refId":"A"}]},{"id":3,"gridPos":{"h":8,"w":12,"x":0,"y":8},"type":"timeseries","title":"Latency p99","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le, service))","legendFormat":"{{service}} p99","refId":"A"}],"fieldConfig":{"defaults":{"unit":"s"}}},{"id":4,"gridPos":{"h":8,"w":12,"x":12,"y":8},"type":"stat","title":"SLO: Data available","datasource":{"type":"prometheus","uid":"prometheus"},"targets":[{"expr":"count(traces_spanmetrics_calls_total)","refId":"A"}],"options":{"reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}}}}]}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: healthcare-api
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: healthcare-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: traceToMetrics
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-json
              mountPath: /etc/grafana/provisioning/dashboards/dashboards-json
            - name: data
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards-json
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: healthcare-api
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
