# API Deployment and Service. Build and load image into k3s:
#   docker build -t healthcare-api:local .
#   k3d image import healthcare-api:local -c k3s-default  # if using k3d
#   # Or for k3s on the host: docker save ... -o /tmp/api.tar && sudo k3s ctr images import /tmp/api.tar
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: healthcare-api
data:
  ENVIRONMENT: development
  OTEL_SERVICE_NAME: healthcare-api
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otelcol:4317"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  DOCUMENT_STORAGE_BUCKET: patient-notes
  DOCUMENT_STORAGE_ENDPOINT: "http://minio.healthcare-api.svc.cluster.local:9000"
  CHUNK_SIZE: "800"
  CHUNK_OVERLAP: "100"
  VECTOR_EMBEDDING_MODEL: "text-embedding-3-small"
  VECTOR_EMBEDDING_DIMENSIONS: "1536"
  OPENAI_SUMMARY_MODEL: "gpt-4o-mini"
  OPENAI_CHAT_MODEL: "gpt-4o-mini"
  PG_TRGM_SIMILARITY_THRESHOLD: "0.2"
  ALLOWED_CONTENT_TYPES: "text/plain, application/pdf, image/jpeg, image/jpg, image/png"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: healthcare-api
type: Opaque
stringData:
  # Set DATABASE_URL to postgresql+asyncpg://user:<POSTGRES_PASSWORD>@postgres.healthcare-api.svc.cluster.local:5432/healthcare
  # Replace <POSTGRES_PASSWORD> with the value from postgres-secret or use a single secret for both.
  DATABASE_URL: "postgresql+asyncpg://user:change-me@postgres.healthcare-api.svc.cluster.local:5432/healthcare"
  DOCUMENT_STORAGE_ACCESS_KEY: "minioadmin"
  DOCUMENT_STORAGE_SECRET_KEY: "minioadmin"
  OPENAI_API_KEY: ""   # Uncomment and set for summary/chat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: healthcare-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: healthcare-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: healthcare-api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
