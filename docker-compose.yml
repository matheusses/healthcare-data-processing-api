services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_SERVICE_NAME: healthcare-api
      ENVIRONMENT: development
      DOCUMENT_STORAGE_ENDPOINT: http://minio:9000
      DOCUMENT_STORAGE_BUCKET: ${DOCUMENT_STORAGE_BUCKET:-patient-notes}
      DOCUMENT_STORAGE_ACCESS_KEY: ${DOCUMENT_STORAGE_ACCESS_KEY:-minioadmin}
      DOCUMENT_STORAGE_SECRET_KEY: ${DOCUMENT_STORAGE_SECRET_KEY:-minioadmin}
      ALLOWED_CONTENT_TYPES: ${ALLOWED_CONTENT_TYPES:-text/plain, application/pdf, image/jpeg, image/jpg, image/png}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      VECTOR_EMBEDDING_MODEL: ${VECTOR_EMBEDDING_MODEL:-text-embedding-3-small}
      VECTOR_EMBEDDING_DIMENSIONS: ${VECTOR_EMBEDDING_DIMENSIONS:-1536}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-4o-mini}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      OPENAI_TOP_P: ${OPENAI_TOP_P:-0.5}
      PG_TRGM_SIMILARITY_THRESHOLD: ${PG_TRGM_SIMILARITY_THRESHOLD:-0.2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      otelcol:
        condition: service_started
      minio:
        condition: service_started
      minio-provision:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-provision:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DOCUMENT_STORAGE_BUCKET: ${DOCUMENT_STORAGE_BUCKET:-patient-notes}
      DOCUMENT_STORAGE_ACCESS_KEY: ${DOCUMENT_STORAGE_ACCESS_KEY:-minioadmin}
      DOCUMENT_STORAGE_SECRET_KEY: ${DOCUMENT_STORAGE_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$$DOCUMENT_STORAGE_BUCKET;
      if [ \"$$DOCUMENT_STORAGE_ACCESS_KEY\" != \"$$MINIO_ROOT_USER\" ]; then
        mc admin user add local $$DOCUMENT_STORAGE_ACCESS_KEY $$DOCUMENT_STORAGE_SECRET_KEY || true;
        mc admin policy attach local readwrite --user $$DOCUMENT_STORAGE_ACCESS_KEY;
      fi
      "
    restart: "no"

  postgres:
    # pgvector image required for note_chunks embeddings (vector extension)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432" # host 5434 to avoid conflict with local PostgreSQL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-healthcare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otelcol-config.yml:/etc/otelcol/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    depends_on:
      - loki
      - tempo
      - grafana

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"  # host 4319 to avoid conflict with otelcol on 4317
    depends_on:
      - prometheus  # metrics-generator remote_writes to Prometheus; ensure it is up

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      # Enable Trace to Metrics so provisioned tracesToMetrics queries appear in Tempo datasource
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  postgres-data:
  minio-data:
  loki-data:
  prometheus-data:
  tempo-data:
  grafana-data:
